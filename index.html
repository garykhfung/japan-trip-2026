<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip 2026 | Smart Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --jp-red: #bc002d; --dark: #2d2d2d; --light: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        header { background: var(--jp-red); color: white; padding: 1.5rem; text-align: center; }
        .container { max-width: 1000px; margin: 1rem auto; padding: 0 1rem; }
        .card { background: white; padding: 1.2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 1rem; }
        #map { height: 350px; border-radius: 8px; border: 2px solid var(--jp-red); transition: all 0.5s ease; }
        h2 { border-bottom: 2px solid var(--jp-red); padding-bottom: 0.5rem; color: var(--jp-red); margin-top: 0; font-size: 1.2rem; }
        .status-bar { background: #333; color: #fff; padding: 5px 15px; font-size: 0.8rem; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
        #itinerary-content { white-space: pre-line; line-height: 1.6; border-left: 3px solid #eee; padding-left: 15px; }
    </style>
</head>
<body>

<header>
    <h1>Japan Adventure 2026</h1>
</header>

<div class="container">
    <div class="status-bar" id="trip-status">Checking your schedule...</div>
    
    <div class="card">
        <h2 id="location-title">Current Destination</h2>
        <div id="map"></div>
    </div>

    <div class="card">
        <h2>Itinerary <span style="font-size: 0.7rem; color: #888;">(Detects 'Tokyo: May [Date]')</span></h2>
        <div id="itinerary-content">Loading...</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Coordinates
    const LOCS = {
        fuji: { coords: [35.484, 138.805], name: "Fujiyoshida (Mt. Fuji)" },
        tokyo: { coords: [35.689, 139.692], name: "Tokyo City Center" }
    };

    // Initialize Map at a neutral zoom first
    const map = L.map('map').setView(LOCS.fuji.coords, 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const marker = L.marker(LOCS.fuji.coords).addTo(map);

    // Main logic to sync text with map
    async function syncTrip() {
        try {
            const response = await fetch('itinerary.txt');
            const text = await response.text();
            document.getElementById('itinerary-content').innerText = text;

            // PARSING LOGIC: Look for "Tokyo: May XX"
            const match = text.match(/Tokyo:\s*May\s*(\d+)/i);
            const moveDay = match ? parseInt(match[1]) : 21; // Default to 21 if not found

            // Determine current simulated date for 2026
            // Note: Since we are in 2024/25, we check current day/month
            const now = new Date();
            const currentMonth = now.getMonth() + 1; // 1-12
            const currentDay = now.getDate();
            
            let destination = LOCS.fuji;
            let statusPrefix = "Currently in: ";

            // Logic: If it is May and today's date >= moveDay, go to Tokyo
            // (Or if it's after May)
            if (currentMonth > 5 || (currentMonth === 5 && currentDay >= moveDay)) {
                destination = LOCS.tokyo;
            }

            // Update UI
            document.getElementById('location-title').innerText = destination.name;
            document.getElementById('trip-status').innerText = `Schedule Sync: Move to Tokyo set for May ${moveDay}`;
            
            // Move Map
            map.flyTo(destination.coords, 13, { duration: 2 });
            marker.setLatLng(destination.coords).bindPopup(destination.name).openPopup();

        } catch (err) {
            document.getElementById('itinerary-content').innerText = "Error loading itinerary.txt";
        }
    }

    syncTrip();
</script>
</body>
</html>
